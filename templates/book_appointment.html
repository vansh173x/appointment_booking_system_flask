{% extends "base.html" %}
{% block title %}Book Appointment — EHealth{% endblock %}
{% block content %}
<div class="container">
  <div class="container-sm" style="margin:0 auto;max-width:600px">
    <div class="card">
      <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;padding-bottom:16px;border-bottom:1px solid var(--border)">
        <div class="doctor-avatar" style="background:var(--primary);color:#fff;margin:0">👨‍⚕️</div>
        <div>
          <h2 style="margin:0">Dr. {{ doctor.name }}</h2>
          <div style="color:var(--muted)">{{ doctor.specialization }} · ₹{{ doctor.fee|int }}</div>
        </div>
      </div>
      <form method="POST">
        <div class="form-row">
          <div class="form-group">
            <label>Date</label>
            <input type="date" name="date" required>
          </div>
          <div class="form-group">
            <label>Time</label>
            <input type="time" name="time" required>
          </div>
        </div>
        <div class="form-group">
          <label>Reason for Visit (optional)</label>
          <textarea name="reason" placeholder="Briefly describe your symptoms or reason..."></textarea>
        </div>
        <button class="btn btn-primary btn-block">Confirm Booking</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
